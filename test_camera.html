<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .video-container {
            margin: 20px 0;
            border: 2px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            max-width: 640px;
            display: block;
            background: #000;
        }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        button.start {
            background-color: #28a745;
            color: white;
        }
        button.stop {
            background-color: #dc3545;
            color: white;
        }
        select {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
            border-radius: 5px;
        }
        .messages {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <h1>Camera Test Utility</h1>
    <p>Use this page to test if your browser can detect and access your camera.</p>

    <div class="controls">
        <select id="cameraSelect">
            <option value="">Loading cameras...</option>
        </select>
        <button id="startBtn" class="start" disabled>Start Camera</button>
        <button id="stopBtn" class="stop" disabled>Stop Camera</button>
    </div>

    <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <div id="messages" class="messages"></div>

    <script>
        const video = document.getElementById('video');
        const cameraSelect = document.getElementById('cameraSelect');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const messagesDiv = document.getElementById('messages');

        let currentStream = null;

        // Function to show messages
        function showMessage(message, type = 'info') {
            messagesDiv.className = `messages ${type}`;
            messagesDiv.textContent = message;
        }

        // Check for browser support
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
            showMessage('Your browser does not support camera access.', 'error');
            cameraSelect.innerHTML = '<option value="">Camera not supported</option>';
            cameraSelect.disabled = true;
            return;
        }

        // Enumerate available cameras
        async function enumerateCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = '<option value="">Select a camera...</option>';
                
                if (videoDevices.length === 0) {
                    showMessage('No cameras found on your device.', 'error');
                    cameraSelect.innerHTML = '<option value="">No cameras found</option>';
                    cameraSelect.disabled = true;
                    return;
                }

                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.textContent = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });

                // Enable the start button once cameras are loaded
                cameraSelect.disabled = false;
                startBtn.disabled = false;
                showMessage(`Found ${videoDevices.length} camera(s). Please select one and click "Start Camera".`, 'success');
            } catch (err) {
                console.error('Error enumerating cameras:', err);
                showMessage('Error accessing cameras: ' + err.message, 'error');
                cameraSelect.innerHTML = '<option value="">Error accessing cameras</option>';
                cameraSelect.disabled = true;
            }
        }

        // Start camera function
        async function startCamera() {
            const selectedDeviceId = cameraSelect.value;
            if (!selectedDeviceId) {
                showMessage('Please select a camera first.', 'error');
                return;
            }

            try {
                // Stop any existing stream
                if (currentStream) {
                    stopCamera();
                }

                const constraints = {
                    video: { deviceId: { exact: selectedDeviceId } },
                    audio: false
                };

                showMessage('Requesting camera access...', 'info');
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);

                video.srcObject = currentStream;
                video.style.display = 'block';

                startBtn.disabled = true;
                stopBtn.disabled = false;
                showMessage('Camera started successfully!', 'success');
            } catch (err) {
                console.error('Error starting camera:', err);
                let message = 'Failed to start camera: ' + err.message;
                if (err.name === 'NotAllowedError') {
                    message = 'Permission to access the camera was denied. Please allow camera access in your browser settings.';
                } else if (err.name === 'NotFoundError') {
                    message = 'The selected camera was not found. Please check your device.';
                } else if (err.name === 'NotReadableError') {
                    message = 'The camera is already in use by another application.';
                }
                showMessage(message, 'error');
            }
        }

        // Stop camera function
        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
                video.srcObject = null;
            }
            startBtn.disabled = false;
            stopBtn.disabled = true;
            showMessage('Camera stopped.', 'info');
        }

        // Event Listeners
        cameraSelect.addEventListener('change', () => {
            if (cameraSelect.value) {
                startBtn.disabled = false;
            } else {
                startBtn.disabled = true;
            }
        });

        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);

        // Initialize by enumerating cameras
        enumerateCameras();
    </script>
</body>
</html>
